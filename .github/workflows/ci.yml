name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest
      - name: Test
        run: pytest

  r:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: r/rtfreporter
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Check load
        run: Rscript -e "source('R/hello.R'); stopifnot(grepl('rtfreporter', hello_rtfreporter()))"
