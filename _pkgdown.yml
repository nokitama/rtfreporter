footer:
  structure:
    left:  [developed_by, built_with]
    right: [package, license]
  components:
    # pkgdown 2.x does NOT interpolate {{version}} in footer components;
    # to avoid showing a literal "{{version}}" we drop it here and rely
    # on the pkgdown version-label badge in the navbar (configured via
    # `development.version_label`).
    package: "[rtfreporter](https://github.com/ichirio/rtfreporter) (development version)"
    license: "[Apache 2.0 licensed](https://github.com/ichirio/rtfreporter/blob/main/LICENSE.md)"

reference:
  # ── 1. Document & rendering ────────────────────────────────────────────
  - title: Document & rendering
    desc: >
      The pipe entry point and the final render call.  Build a document by
      piping `rtf_document()` through the section / content calls below, then
      render it with `generate_rtfreport()`.
    contents:
      - rtf_document
      - rtf_config
      - generate_rtfreport
      - print.rtf_document

  # ── 2. Sections: headers & footers ─────────────────────────────────────
  - title: Sections — headers & footers
    desc: >
      A section applies a header / footer to a range of pages.  Headers and
      footers are themselves small tables whose rows you build with
      `rtf_header()` / `rtf_footer()` and edit with the `update_*_row()`
      helpers.
    contents:
      - rtf_section
      - rtf_header
      - rtf_footer
      - update_header_row
      - update_footer_row

  # ── 3. Page content: tables & figures ──────────────────────────────────
  - title: Page content — tables & figures
    desc: >
      Add one content item per page with `rtf_tables()` / `rtf_figures()`
      (each list element becomes one page), and attach per-page titles /
      footnotes.  For fine-grained control, build the content object yourself
      with `rtftable()` / `rtfplot()` and pass it in.
    contents:
      - rtf_tables
      - rtf_figures
      - rtf_titles
      - rtf_footnotes
      - rtftable
      - rtfplot

  # ── 4. Importing external table objects ────────────────────────────────
  - title: Importing tables (gt / gtsummary / rtables → rtftable)
    desc: >
      Convert a table object — a [gt::gt()] table, a gtsummary table, an
      rtables/tern `VTableTree`, or a plain data.frame / tibble (or a list of
      any of these) — into `rtftable()` objects ready for `rtf_tables()`,
      reading the source's metadata and paginating in one call.
      `as_rtftables()` returns one rtftable **per page** (a list);
      `as_rtftable()` is the single-page form returning **one** object — they
      differ only in singular vs. list.
    contents:
      - as_rtftables
      - as_rtftable

  # ── 5. Column headers ──────────────────────────────────────────────────
  - title: Column headers
    desc: >
      Multi-row column headers with optional spanning cells expressed
      uniformly via `pos = 1` or `pos = c(2, 5)`.  Top-level spanning works
      without a separate `spanning_header` argument.
    contents:
      - col_cell
      - rtf_col_header
      - add_col_header_row

  # ── 6. Built-in cell-format functions ──────────────────────────────────
  - title: Built-in cell-format functions
    desc: >
      Ready-made cell re-formatters for the `cell_format` argument of
      `rtftable()` / `as_rtftables()` (e.g. monospaced count/percent
      alignment).  These are provided for convenience — you can also write
      your own, following the same one-column-in / one-column-out contract.
    contents:
      - format_count_pct
      - realign_count_pct
      - fmt_count_paren
      - fmt_count_paren_bare
      - fmt_right_align

  # ── 7. Blank rows ──────────────────────────────────────────────────────
  - title: Blank rows
    desc: Insert blank separator rows by position, by value change, or by rule.
    contents:
      - set_blank_rows
      - blank_rows_by_change
      - blank_rows_by_rule

  # ── 7b. Pagination strategies & helpers ────────────────────────────────
  - title: Pagination strategies & helpers
    desc: >
      Built-in page-split strategies as reusable functions for the `split=`
      argument of `as_rtftables()`, plus a helper for writing your own.
    contents:
      - page_split
      - add_cont_label

  # ── 8. Borders ─────────────────────────────────────────────────────────
  - title: Borders
    desc: >
      Border specifications.  Borders apply not only to content-table zones
      but also to **header and footer rows** and to individual cells /
      columns, so the same builders are reused throughout a report.
    contents:
      - rtf_border_side
      - rtf_border
      - rtf_border_with
      - rtf_border_none
      - rtf_border_top
      - rtf_border_bottom
      - rtf_border_box
      - rtf_table_border
      - rtf_border_tfl

  # ── 9. Shared table styles ─────────────────────────────────────────────
  - title: Shared table styles (S3, snapshot)
    desc: >
      Bundle border + padding + row-height defaults into a reusable style and
      share it across many tables.  Snapshot semantics: a table captures the
      style's state at construction.
    contents:
      - rtf_table_style
      - rtf_table_style_with
      - rtf_table_style_tfl

  # ── 10. Column-width utilities ─────────────────────────────────────────
  - title: Column-width utilities
    contents:
      - text_width_in
      - auto_col_widths

  # ── 11. Visual preview (S3 plot methods) ───────────────────────────────
  - title: Visual preview (S3 plot methods)
    desc: >
      Quick base-graphics wireframes of rtfreporter objects, for
      sanity-checking layouts before rendering RTF.
    contents:
      - plot.rtf_border
      - plot.rtf_border_side
      - plot.rtf_table_border
      - plot.rtftable
      - plot.rtf_document

  # ── 12. Assembling multiple RTF files ──────────────────────────────────
  - title: Assembling multiple RTF files
    desc: >
      Combine several rendered RTF files into one deliverable with a table of
      contents (e.g. a TLF shell catalogue).
    contents:
      - assemble_rtf
      - assemble_files
      - assemble_folder
      - assemble_spec
      - assemble_from_spec
      - assemble_toc
      - toc_heading
      - toc_entry

  # ── 13. Post-processing ────────────────────────────────────────────────
  - title: Post-processing
    desc: >
      "Last mile" tweaks to an already-rendered RTF file, such as a one-off
      find-and-replace on the generated bytes.
    contents:
      - rtf_replace_text

  # ── 14. Deprecated ─────────────────────────────────────────────────────
  - title: Deprecated
    contents:
      - rtf_format-deprecated
      - paginate

# Articles index page (/articles/).  Grouped so users land on the
# tutorial first; learner-focused material sits at the bottom.
articles:
  - title: For package users
    desc: >
      Practical guides for generating RTF deliverables.  Start with the
      Quickstart, then dive into the Pipe API guide.
    navbar: ~
    contents:
      - rtfreporter-quickstart
      - rtfreporter-pipes
      - articles/page-setup
      - gt-integration
      - articles/pagination

  - title: Worked clinical examples
    desc: End-to-end recipes for typical clinical TFL deliverables.
    navbar: ~
    contents:
      - articles/tlg-catalog
      - articles/example-demog
      - articles/example-lab

  - title: For contributors
    desc: >
      How rtfreporter is built and how to extend it.  Start with the
      architecture overview, then the adapter how-to.  Each article opens
      in English with an "In Japanese" toggle at the top.
    navbar: ~
    contents:
      - articles/architecture
      - articles/extending-adapters

  - title: コントリビューター向け資料（日本語 / Japanese）
    desc: >
      Japanese versions of the contributor articles (reachable from the
      "In Japanese" toggle), plus the authoritative in-depth design
      specifications.  日本語のコントリビューター向け資料と詳細設計書です。
    navbar: ~
    contents:
      - articles/architecture-ja
      - articles/extending-adapters-ja
      - articles/external-api
      - articles/internal-design

# News configuration:
# Until v0.1.0 we are publishing every dev release as one rolling section
# ("Development version").  Once v0.1.0 ships the section breakdown
# below will be updated to show per-version history.
news:
  one_page: true
  releases:
    - text: "Development version (pre-v0.1.0)"
