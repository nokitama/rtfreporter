url: https://ichirio.github.io/rtfreporter/

template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: "#1f4e79"
    base_font: {google: "Source Sans 3"}
    heading_font: {google: "Source Sans 3"}
    code_font: {google: "JetBrains Mono"}
  opengraph:
    twitter:
      creator: "@ichirio"
      site: "@ichirio"
      card: summary

# Development-version banner: the package is pre-v0.1.0, so every push
# overwrites the published docs at the root (no version subdir).
# Versioned history will start once v0.1.0 is tagged.
#
# `mode: unreleased` is deliberate (NOT "release"):
#   * pages are still published at the root (no /dev/ subdirectory),
#   * but pkgdown does NOT suppress the README's <!-- badges ... -->
#     block when lifting it into the sidebar `dev` slot.  Under
#     `mode: release` the badges would be hidden, which is wrong for
#     a pre-release codebase whose status we WANT users to see.
development:
  mode: unreleased
  version_label: warning
  version_tooltip: >
    Development version (pre-v0.1.0).  API may change in
    backwards-incompatible ways before v0.1.0.

home:
  title: "rtfreporter — Clinical RTF Reporting Toolkit for R"
  description: >
    Standalone R toolkit for generating Rich Text Format (RTF) Tables,
    Listings and Figures (TFLs) for clinical trial deliverables.  Pure
    S3 architecture; no dependency on r2rtf, reporter, or any other RTF
    library; works on any modern R out of the box.
  # Keep README's H1 (which contains the logo image) on the home page.
  # Keep README's H1 (which contains the logo image) on the home page.
  strip_header: false
  sidebar:
    # User-facing info (Links / Community / Citation / Developers /
    # License) on top; dev-status (badges) and the dev-stage roadmap
    # are deliberately pushed to the BOTTOM of the sidebar so they
    # don't compete for attention on the landing page.  `dev` is the
    # built-in slot pkgdown uses to inject the README's
    # `<!-- badges: start --> ... <!-- badges: end -->` block — DO NOT
    # override it with a custom `dev:` component or the badges will
    # vanish.  Roadmap / dev-stage notes live in `devnotes`.
    structure: [links, community, citation, authors, license, devnotes, dev]
    components:
      devnotes:
        title: Dev stage
        text: |
          Pre-v0.1.0 development; API may still break.

          Roadmap:

          - **v0.1.0** — first GitHub release, pkgdown site live.
          - **v0.2.x** — `R CMD check --as-cran` clean, lifted coverage.
          - **v0.3+**  — CRAN submission, `pharmaverse` candidacy.
      community:
        title: Community
        text: |
          [Open an issue](https://github.com/ichirio/rtfreporter/issues/new)
          ·
          [Browse issues](https://github.com/ichirio/rtfreporter/issues)
          ·
          [Discussions (TBD)](https://github.com/ichirio/rtfreporter/discussions)
          ·
          [Contributing](https://github.com/ichirio/rtfreporter/blob/main/CONTRIBUTING.md)
  links:
    - text: Browse source on GitHub
      href: https://github.com/ichirio/rtfreporter
    - text: Open / triage issues
      href: https://github.com/ichirio/rtfreporter/issues
    - text: Release notes (NEWS.md)
      href: news/index.html
    - text: License (MIT)
      href: https://github.com/ichirio/rtfreporter/blob/main/LICENSE.md

