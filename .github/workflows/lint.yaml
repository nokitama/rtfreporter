# Static style/lint check on the package source.  Fails the build on any lint.
# Configuration lives in the repository-root `.lintr` (which restricts the
# scope to R/ and tunes the linter set).  Derived from r-lib/actions examples.
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: lint

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr, local::.
          needs: lint

      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true
