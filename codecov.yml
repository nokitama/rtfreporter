comment: false

# Phase 1 baseline (v0.0.28): 73%.  After the R6 removal in v0.0.41
# we sit at 91.88%.  We lock a 70% floor so any future PR that drops
# below 70% fails the check.  Patch coverage is informational only --
# new features land with their tests but we don't gate on a specific
# patch-level threshold.
#
# `range` controls the colour gradient on the README badge:
#   * <= 70%  -> red
#   *  70-90% -> red -> yellow -> green gradient
#   * >= 90%  -> pure green
# The high end is matched to our long-term target so anything at
# "release-ready" coverage shows pure green on the badge, not the
# `#97ca00` yellow-green that Codecov hands out for partial-gradient
# values.
coverage:
  range: "70...90"
  status:
    project:
      default:
        target: 70%
        threshold: 1%
        informational: false
    patch:
      default:
        target: 60%
        threshold: 1%
        informational: true
