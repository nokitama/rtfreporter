# Build a pkgdown site and deploy it to GitHub Pages.
# Derived from r-lib/actions examples.
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      # vignettes/articles/*.qmd → needs the Quarto CLI + R package.
      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # quarto = R bindings to the Quarto CLI installed above.
          # kableExtra = used by the worked-example articles
          #              (vignettes/articles/example-*.qmd).
          extra-packages: any::pkgdown, any::quarto, any::kableExtra, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          # Re-write gh-pages as a single-commit branch each deploy so we
          # never see merge / fast-forward errors from accumulated history.
          # Pre-v0.1.0 there is no version-history retention requirement.
          force_orphan: true
          user_name:  "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy pkgdown site (${{ github.sha }})"
