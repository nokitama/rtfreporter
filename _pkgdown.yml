  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/rtfreporter-quickstart.html
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Articles
      menu:
        # ── For package users (primary) ────────────────────────────────
        - text: "For package users"
        - text: "Quickstart"
          href: articles/rtfreporter-quickstart.html
        - text: "Pipe API guide"
          href: articles/rtfreporter-pipes.html
        # ── Worked clinical examples ────────────────────────────────────
        - text: -------
        - text: "Worked clinical examples"
        - text: "Demographics table"
          href: articles/example-demog.html
        - text: "Lab summary"
          href: articles/example-lab.html
        # ── Specification / internals (advanced) ────────────────────────
        - text: -------
        - text: "Specification & internals"
        - text: "External API specification"
          href: articles/external-api.html
        - text: "Internal class design (S3)"
          href: articles/internal-design.html
    news:
      text: Changelog
      href: news/index.html
    github:
      icon: fab fa-github
      href: https://github.com/ichirio/rtfreporter
      aria-label: GitHub

footer:
  structure:
    left:  [developed_by, built_with]
    right: [package, license]
  components:
    # pkgdown 2.x does NOT interpolate {{version}} in footer components;
    # to avoid showing a literal "{{version}}" we drop it here and rely
    # on the pkgdown version-label badge in the navbar (configured via
    # `development.version_label`).
    package: "[rtfreporter](https://github.com/ichirio/rtfreporter) (development version)"
    license: "[MIT licensed](https://github.com/ichirio/rtfreporter/blob/main/LICENSE.md)"

reference:
  - title: Pipe-composition API
    desc: >
      Primary user-facing API.  Build a document by piping
      `rtf_document()` through section / content / format calls, then
      render with `generate_rtfreport()`.
    contents:
      - rtf_document
      - print.rtf_document
      - rtf_config
      - rtf_section
      - rtf_tables
      - rtf_figures
      - rtf_titles
      - rtf_footnotes
      - generate_rtfreport
      - assemble_rtf
      - toc_heading
      - toc_entry

  - title: Content constructors
    desc: Build a richly formatted table or figure object.
    contents:
      - rtftable
      - rtfplot
      - as_rtftable

  - title: Headers, footers and tokens
    contents:
      - rtf_header
      - update_header_row

  - title: Table-object conversion & pagination
    desc: >
      Convert a table object — a [gt::gt()] table, a gtsummary table, an
      rtables/tern `VTableTree`, or a plain data.frame / tibble (or a list
      of any of these) — into a list of `rtftable()` objects, one per RTF
      page, ready for `rtf_tables()`.  Reads the source's metadata and
      paginates in a single call.
    contents:
      - as_rtftables
      - set_blank_rows
      - format_count_pct
      - realign_count_pct

  - title: Unified column-header API
    desc: >
      Multi-row column headers with optional spanning cells expressed
      uniformly via `pos = 1` or `pos = c(2, 5)`.  Top-level spanning
      works without a separate `spanning_header` argument.
    contents:
      - col_cell
      - rtf_col_header
      - add_col_header_row

  - title: Borders
    desc: Border specifications for cells, rows and table zones.
    contents:
      - rtf_border_side
      - rtf_border
      - rtf_border_with
      - rtf_border_none
      - rtf_border_top
      - rtf_border_bottom
      - rtf_border_box
      - rtf_table_border
      - rtf_border_tfl

  - title: Shared table style (S3, snapshot)
    contents:
      - rtf_table_style
      - rtf_table_style_with
      - rtf_table_style_tfl

  - title: Visual preview (S3 plot methods)
    desc: >
      Quick base-graphics wireframes of rtfreporter objects, for
      sanity-checking layouts before rendering RTF.
    contents:
      - plot.rtf_border
      - plot.rtf_border_side
      - plot.rtf_table_border
      - plot.rtftable
      - plot.rtf_document

  - title: Blank-row specifications
    contents:
      - blank_rows_by_change
      - blank_rows_by_rule

  - title: Column-width helpers
    contents:
      - text_width_in
      - auto_col_widths

  - title: Deprecated
    contents:
      - rtf_format-deprecated
      - paginate

# Articles index page (/articles/).  Grouped so users land on the
# tutorial first; learner-focused material sits at the bottom.
articles:
  - title: For package users
    desc: >
      Practical guides for generating RTF deliverables.  Start with the
      Quickstart, then dive into the Pipe API guide.
    navbar: ~
    contents:
      - rtfreporter-quickstart
      - rtfreporter-pipes
      - gt-integration

  - title: Worked clinical examples
    desc: End-to-end recipes for typical clinical TFL deliverables.
    navbar: ~
    contents:
      - articles/example-demog
      - articles/example-lab

  - title: For contributors
    desc: >
      How rtfreporter is built and how to extend it.  Start with the
      architecture overview, then the adapter how-to.  Each article opens
      in English with an "In Japanese" toggle at the top.
    navbar: ~
    contents:
      - articles/architecture
      - articles/extending-adapters

  - title: コントリビューター向け資料（日本語 / Japanese）
    desc: >
      Japanese versions of the contributor articles (reachable from the
      "In Japanese" toggle), plus the authoritative in-depth design
      specifications.  日本語のコントリビューター向け資料と詳細設計書です。
    navbar: ~
    contents:
      - articles/architecture-ja
      - articles/extending-adapters-ja
      - articles/external-api
      - articles/internal-design

# News configuration:
# Until v0.1.0 we are publishing every dev release as one rolling section
# ("Development version").  Once v0.1.0 ships the section breakdown
# below will be updated to show per-version history.
news:
  one_page: true
  releases:
    - text: "Development version (pre-v0.1.0)"
